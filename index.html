  <script src="./content.js"></script>
  <script>
    const i18n = window.SITE_CONTENT || {};
    const linksCopy = {
      zh: { title: "案例展示", sub: "记录探索路上的每一个足迹", open: "打开链接" },
      ja: { title: "参考サイトとツール", sub: "制作したサイトやよく使うツールを表示します（site-links.txtで編集）。", open: "リンクを開く" },
      en: { title: "Featured Sites & Tools", sub: "Showcase your previous websites or tools (editable via site-links.txt).", open: "Open Link" }
    };
    const defaultLinks = [
      { url: "https://example.com/pension-tool", zh: { title: "养老金计算器", desc: "退休金测算页面示例" }, ja: { title: "年金計算ツール", desc: "年金試算ページの例" }, en: { title: "Pension Calculator", desc: "Sample retirement calculation page" } },
      { url: "https://example.com/rental-guide", zh: { title: "租房申请指南", desc: "政策信息与办理路径说明" }, ja: { title: "賃貸申請ガイド", desc: "制度情報と申請手順の説明" }, en: { title: "Rental Application Guide", desc: "Policy info and application steps" } },
      { url: "https://example.com/content-tool", zh: { title: "内容发布工具", desc: "自动化发布与素材管理" }, ja: { title: "コンテンツ配信ツール", desc: "自動配信と素材管理" }, en: { title: "Content Publishing Tool", desc: "Automated publishing and asset management" } },
      { url: "https://example.com/booking", zh: { title: "客户预约页", desc: "咨询预约与线索收集页面" }, ja: { title: "予約ページ", desc: "相談予約とリード収集ページ" }, en: { title: "Client Booking Page", desc: "Inquiry booking and lead capture" } },
      { url: "https://example.com/dashboard", zh: { title: "数据看板", desc: "访问、转化与渠道效果统计" }, ja: { title: "データダッシュボード", desc: "流入・CV・チャネル効果の可視化" }, en: { title: "Data Dashboard", desc: "Traffic, conversion, and channel performance" } },
      { url: "https://example.com/portfolio", zh: { title: "作品总览", desc: "已上线网站与项目合集" }, ja: { title: "実績一覧", desc: "公開済みサイトとプロジェクト一覧" }, en: { title: "Portfolio Overview", desc: "Collection of launched sites and projects" } },
      { url: "https://example.com/map-optimization", zh: { title: "门店地图优化页", desc: "地图资料完善与本地搜索优化案例" }, ja: { title: "店舗マップ最適化", desc: "地図情報整備とローカルSEO事例" }, en: { title: "Map Optimization Page", desc: "Profile optimization and local search case" } },
      { url: "https://example.com/ai-workflow", zh: { title: "AI 工作流演示站", desc: "从需求到交付的自动化流程演示" }, ja: { title: "AIワークフローデモ", desc: "要件定義から納品までの自動化例" }, en: { title: "AI Workflow Demo", desc: "Automation flow from request to delivery" } }
    ];
    let customLinks = [];
    let linksLoadStarted = false;

    function parseLinksText(text){
      return text
        .replace(/^\uFEFF/, "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line && !line.startsWith("#"))
        .map((line) => line.split(/\s*[|｜]\s*/).map((x) => x.trim()))
        .filter((arr) => arr.length >= 2)
        .map((arr) => {
          const zhTitle = arr[0] || "";
          const url = arr[1] || "";
          const zhDesc = arr[2] || "";
          const jaTitle = arr[3] || zhTitle;
          const jaDesc = arr[4] || zhDesc;
          const enTitle = arr[5] || zhTitle;
          const enDesc = arr[6] || zhDesc;
          return {
            url,
            zh: { title: zhTitle, desc: zhDesc },
            ja: { title: jaTitle, desc: jaDesc },
            en: { title: enTitle, desc: enDesc }
          };
        });
    }

    function renderLinksSection(lang){
      const copy = linksCopy[lang] || linksCopy.zh;
      const list = customLinks.length ? customLinks : defaultLinks;
      const iconClasses = [
        "bg-rose-100 text-rose-600",
        "bg-amber-100 text-amber-600",
        "bg-emerald-100 text-emerald-600",
        "bg-sky-100 text-sky-600",
        "bg-fuchsia-100 text-fuchsia-600",
        "bg-indigo-100 text-indigo-600",
        "bg-teal-100 text-teal-600",
        "bg-orange-100 text-orange-600"
      ];
      document.getElementById("linksTitle").textContent = copy.title;
      document.getElementById("linksSub").textContent = copy.sub;
      document.getElementById("linksCards").innerHTML = list.map((x, i) => `
        <a href="${x.url}" target="_blank" rel="noopener noreferrer" class="group block rounded-2xl border border-slate-200 bg-white p-5 shadow-[0_14px_30px_-24px_rgba(15,23,42,0.28)] transition duration-200 hover:-translate-y-1 hover:shadow-[0_22px_38px_-24px_rgba(15,23,42,0.36)]">
          <div class="flex items-start gap-3">
            <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-sm font-bold ${iconClasses[i % iconClasses.length]}">◆</span>
            <div class="min-w-0">
              <h3 class="text-[16px] font-semibold leading-6 text-slate-900">${(x[lang] || x.zh || {}).title || ""}</h3>
              <p class="mt-2 min-h-[52px] text-[13px] leading-6 text-slate-600">${(x[lang] || x.zh || {}).desc || ""}</p>
            </div>
          </div>
        </a>
      `).join("");
    }

    async function ensureLinksLoaded(){
      if (linksLoadStarted) return;
      linksLoadStarted = true;
      const ts = Date.now();
      const candidates = [`./site-links.txt?v=${ts}`, `/site-links.txt?v=${ts}`];

      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`http_${res.status}`);
          const txt = await res.text();
          const parsed = parseLinksText(txt);
          if (parsed.length) {
            customLinks = parsed;
            console.info("[site-links] loaded", url, "count=", parsed.length);
            break;
          }
          console.warn("[site-links] empty parsed list from", url);
        } catch (e) {
          console.warn("[site-links] load failed:", url, e);
        }
      }

      if (!customLinks.length) console.warn("[site-links] fallback to defaultLinks");
      const lang = localStorage.getItem("site_lang") || "zh";
      renderLinksSection(lang);
    }

    function render(lang){
      const d=i18n[lang]||i18n.zh;
      localStorage.setItem("site_lang",lang);
      document.documentElement.lang=lang==="ja"?"ja":lang==="en"?"en":"zh-CN";
      document.title = lang==="ja" ? "Yara Code | デジタルマーケティングとブランド構築" : lang==="en" ? "Yara Code | Digital Marketing and Brand Building" : "Yara Code | 数字化营销与品牌建设";
      document.querySelectorAll("#desktopNav a").forEach((n,i)=>n.textContent=(d.nav&&d.nav[i])||n.textContent);
      document.querySelectorAll("#mobileNavLinks a").forEach((n,i)=>n.textContent=(d.nav&&d.nav[i+1])||n.textContent);
      document.getElementById("mobileMenuTitle").textContent=(lang==="zh"?"菜单":(d.menu||document.getElementById("mobileMenuTitle").textContent||"Menu"));
      document.getElementById("heroKicker").textContent=d.hero[0] || "";
      if ((d.hero || []).length >= 6) {
        document.getElementById("heroName").textContent=d.hero[1] || "";
        document.getElementById("heroTitle").textContent=d.hero[2] || "";
        document.getElementById("heroSub").textContent=d.hero[3] || "";
        document.getElementById("heroCta1").textContent=d.hero[4] || "";
        document.getElementById("heroCta2").textContent=d.hero[5] || "";
      } else {
        document.getElementById("heroTitle").textContent=d.hero[1] || "";
        document.getElementById("heroSub").textContent=d.hero[2] || "";
        document.getElementById("heroCta1").textContent=d.hero[3] || "";
        document.getElementById("heroCta2").textContent=d.hero[4] || "";
      }
      if (d.heroStats && d.heroStats.length >= 2) {
        document.getElementById("heroStatLabel1").textContent = d.heroStats[0];
        document.getElementById("heroStatLabel2").textContent = d.heroStats[1];
      }
      document.getElementById("intentTitle").textContent=d.intentTitle;
      document.getElementById("intentSub").textContent=d.intentSub;
      document.getElementById("intentCards").innerHTML=d.intent.map(x=>`<article class="rounded-3xl border border-slate-200 bg-slate-50/45 p-7"><h3 class="text-lg font-semibold text-slate-900">${x[0]}</h3><p class="mt-3 whitespace-pre-line text-[16px] leading-6 text-slate-700 sm:leading-8">${x[1]}</p></article>`).join("");
      document.getElementById("servicesTitle").textContent=d.servicesTitle;
      const capLead = d.capLead || [];
      const capBody = d.capBody || [];
      document.getElementById("capabilityBubbles").innerHTML=capLead.slice(0,3).map((x,i)=>`<article class="cap-bubble cap-bubble-${i+1}" style="--bubble-delay:${i * 0.9}s"><p class="cap-bubble-title">${x}</p><p class="cap-bubble-body">${capBody[i] || ""}</p></article>`).join("");
      document.getElementById("capabilityBubbles").classList.add("cap-bubbles-active");
      document.getElementById("servicesTitle").setAttribute("aria-expanded","false");
      const serviceImages = (d.cases || []).slice(0,3).map((c) => c[3]).concat(["./assets/images/li1.png","./assets/images/li2.png","./assets/images/li3.png"]);
      document.getElementById("servicesCards").innerHTML=d.services.map((x,i)=>`<article class="group service-card rounded-3xl border border-slate-200 bg-white -translate-y-0.5 p-8 shadow-[0_14px_30px_-22px_rgba(15,23,42,0.45)] transition duration-300 hover:border-orange-200"><div class="relative mb-6 aspect-[16/10] overflow-hidden rounded-2xl"><img src="${serviceImages[i] || "./assets/images/li1.png"}" alt="${x[0]}" class="h-full w-full object-cover transition duration-500 group-hover:scale-[1.03]" /></div><h3 class="service-card-title text-xl font-semibold leading-tight text-slate-900">${x[0]}</h3><p class="service-card-desc mt-6 text-[16px] leading-8 text-slate-700">${x[1]}</p><div class="service-tags mt-5">${x[2].slice(0,3).map(li=>`<span class="service-tag">${li}</span>`).join("")}</div></article>`).join("");
      renderLinksSection(lang);
      document.getElementById("processTitle").textContent=d.processTitle;
      document.getElementById("processSub").textContent=d.processSub;
      document.getElementById("processCards").innerHTML=d.process.map((x,i)=>`<article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-[0_14px_30px_-22px_rgba(15,23,42,0.35)]"><p class="text-xs font-semibold tracking-[0.14em] text-orange-500">STEP ${String(i+1).padStart(2,"0")}</p><h3 class="mt-2 text-lg font-semibold text-slate-900">${x[0]}</h3><p class="mt-2 text-[16px] leading-6 text-slate-700">${x[1]}</p></article>`).join("");
      document.getElementById("contactTitle").textContent=d.contact[0];
      document.getElementById("contactSub").textContent=d.contact[1];
      document.getElementById("contactBtn").textContent=d.contact[2];
      document.getElementById("contactBtn").setAttribute("href",`mailto:yara.fcod@gmail.com?subject=${encodeURIComponent(d.contact[3])}`);
      document.getElementById("footerIntro").textContent=d.footer[0];
      document.getElementById("footerExplore").textContent=d.footer[1];
      document.getElementById("footerLinks").innerHTML=d.footer[2].map((x,i)=>`<a href="${i===0?'#services':i===1?'#links':'#contact'}" class="inline-flex items-center gap-1 text-sm text-slate-300 transition hover:text-white">${x}</a>`).join("");
      document.getElementById("footerEmailTitle").textContent=d.footer[3];
      document.getElementById("footerCopy").textContent=d.footer[4];
      document.querySelectorAll("#langSwitch a").forEach((btn,idx)=>{const on=(idx===0&&lang==='zh')||(idx===1&&lang==='ja')||(idx===2&&lang==='en'); btn.classList.toggle('bg-slate-900',on); btn.classList.toggle('text-white',on); btn.classList.toggle('text-slate-600',!on);});
    }

    document.querySelectorAll("#langSwitch a").forEach((btn,idx)=>btn.addEventListener("click",(e)=>{e.preventDefault(); render(idx===0?'zh':idx===1?'ja':'en');}));
    render(localStorage.getItem("site_lang")||"zh");
    ensureLinksLoaded();

    const servicesTitleEl = document.getElementById("servicesTitle");
    const bubbleSideTriggerEl = document.getElementById("bubbleSideTrigger");
    const capBubblesEl = document.getElementById("capabilityBubbles");
    function toggleCapBubbles(){
      if (!capBubblesEl) return;
      const active = capBubblesEl.classList.toggle("cap-bubbles-active");
      if (servicesTitleEl) servicesTitleEl.setAttribute("aria-expanded", active ? "true" : "false");
      if (bubbleSideTriggerEl) bubbleSideTriggerEl.setAttribute("aria-expanded", active ? "true" : "false");
    }
    if (servicesTitleEl && bubbleSideTriggerEl && capBubblesEl) {
      servicesTitleEl.addEventListener("click", toggleCapBubbles);
      bubbleSideTriggerEl.addEventListener("click", toggleCapBubbles);
      servicesTitleEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggleCapBubbles();
        }
      });
    }

    const heroSection = document.getElementById("hero");
    const heroVideo = document.getElementById("heroVideo");
    const avatarVideo = document.getElementById("avatarVideo");
    let avatarInitialized = false;
    function initAvatarVideoAfterHeroReady() {
      if (!avatarVideo || avatarInitialized) return;
      avatarInitialized = true;
      const src = avatarVideo.dataset.src;
      if (src) {
        avatarVideo.setAttribute("src", src);
        avatarVideo.load();
      }
      avatarVideo.play().catch(()=>{});
    }
    function safePlayHeroVideo(){
      if (!heroVideo) return;
      heroVideo.muted = true;
      heroVideo.setAttribute("muted", "");
      heroVideo.setAttribute("playsinline", "");
      heroVideo.setAttribute("webkit-playsinline", "");
      heroVideo.play().catch(()=>{});
    }
    function markHeroReady() {
      if (!heroVideo) return;
      heroVideo.classList.add("is-ready");
      if (heroSection) heroSection.classList.add("hero-ready");
      initAvatarVideoAfterHeroReady();
    }
    function applyHeroVideoSource(){
      if (!heroVideo) return;
      const m = window.matchMedia("(max-width: 768px)").matches;
      const mobileSrc = heroVideo.dataset.srcMobile;
      const desktopSrc = heroVideo.dataset.srcDesktop;
      const nextSrc = m ? mobileSrc : desktopSrc;
      const currentSrc = heroVideo.getAttribute("src");
      if (currentSrc !== nextSrc) {
        heroVideo.setAttribute("src", nextSrc);
        heroVideo.load();
      }
      safePlayHeroVideo();
    }
    if (heroVideo) {
      heroVideo.addEventListener("loadedmetadata", safePlayHeroVideo);
      heroVideo.addEventListener("error", safePlayHeroVideo);
      heroVideo.addEventListener("canplay", markHeroReady, { once: true });
      heroVideo.addEventListener("loadeddata", markHeroReady, { once: true });
      // If the video was already loaded before listeners were attached, reveal immediately.
      if (heroVideo.readyState >= 2) {
        markHeroReady();
      } else {
        setTimeout(() => {
          if (!heroVideo.classList.contains("is-ready")) {
            safePlayHeroVideo();
            if (heroVideo.readyState >= 1) markHeroReady();
          }
        }, 1200);
      }
    }
    if (avatarVideo) {
      avatarVideo.pause();
      avatarVideo.removeAttribute("src");
    }
    if (avatarVideo) {
      const revealAvatarVideo = () => avatarVideo.classList.add("is-ready");
      avatarVideo.addEventListener("canplay", revealAvatarVideo, { once: true });
      avatarVideo.addEventListener("loadeddata", revealAvatarVideo, { once: true });
    }
    applyHeroVideoSource(); window.addEventListener("resize",applyHeroVideoSource); window.addEventListener("orientationchange",applyHeroVideoSource);

    const menuBtn = document.getElementById("menuBtn"), mobileNav = document.getElementById("mobileNav"), menuCloseBtn = document.getElementById("menuCloseBtn"), mobileNavBackdrop = document.getElementById("mobileNavBackdrop"), scrollBar=document.getElementById("scrollBar"), navItems=document.querySelectorAll("a[data-nav]");
    function openMobileNav(){ mobileNav.classList.remove("hidden"); mobileNav.style.display="block"; document.body.style.overflow="hidden"; } function closeMobileNav(){ mobileNav.classList.add("hidden"); mobileNav.style.display=""; document.body.style.overflow=""; }
    menuBtn.addEventListener("click",openMobileNav); menuCloseBtn.addEventListener("click",closeMobileNav); mobileNavBackdrop.addEventListener("click",closeMobileNav);
    mobileNav.querySelectorAll("a").forEach((a)=>a.addEventListener("click",closeMobileNav));
    document.querySelectorAll('a[href^="#"]').forEach((a)=>a.addEventListener("click",(e)=>{ const id=a.getAttribute("href").slice(1),el=document.getElementById(id); if(!el)return; e.preventDefault(); window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-76,behavior:"smooth"}); }));
    function updateNav(){ const doc=document.documentElement; const top=window.scrollY||doc.scrollTop; const total=doc.scrollHeight-window.innerHeight; scrollBar.style.width=(total>0?(top/total)*100:0)+"%"; let current="hero"; ["hero","services","links","process","contact"].forEach((id)=>{const s=document.getElementById(id); if(s&&window.scrollY+120>=s.offsetTop) current=id;}); navItems.forEach((a)=>{const on=a.dataset.nav===current; a.classList.toggle("bg-slate-900",on); a.classList.toggle("text-white",on); a.classList.toggle("text-slate-600",!on);});}
    updateNav(); window.addEventListener("scroll",updateNav,{passive:true}); window.addEventListener("resize",updateNav);
  </script>
</body>
</html>
